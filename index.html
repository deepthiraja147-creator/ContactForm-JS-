<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="reg">
        <h2 class="cu"><b>Contact us</b></h2>
        <form>
            <div class="name container">
                <div class="row">
                    <div class="col-12 col-md-6" style="font-size: small;">
                        <b>First Name <span class="required">*</span></b> <br>
                        <input type="text">
                    </div>

                    <div class="col-12 col-md-6" style="font-size: small;">
                        <b>Last Name <span class="required">*</span></b> <br>
                        <input type="text">
                    </div>

                    <div class="col-12">
                        <b class="em" style="font-size: small;">Email Address <span class="required">*</span></b> <br>
                        <input class="email" type="text">
                    </div>

                    <div class="col-12">
                        <b class="em mb-1" style="font-size: small;">Query Type <span class="required">*</span> </b>
                    </div>
                    <div class="col-md-6 mt-2">
                        <div class="query-box">
                            <input type="radio" name="query">
                            <span>General Enquiry</span>
                        </div>
                    </div>

                    <div class="col-md-6 mt-2">
                        <div class="query-box">
                            <input type="radio" name="query">
                            <span>Support Request</span>
                        </div>
                    </div>

                    <div class="col-12 mt-2">
                        <b class="em" style="font-size: small;">Message <span class="required">*</span></b> <br>
                        <textarea name="Message" id="msg" class="msg mt-2"></textarea>
                    </div>

                    <div class="col-12">
                        <input style="height: 15px; width: 40px;" type="checkbox">
                        <b class="ch" style="font-size: small;">
                            I consent to beimg contacted by the team  <span class="required">*</span></b> <br>
                    </div>

                    

                    <div class="col-12">
                        <input class="sub" type="submit">
                    </div>
                </div>
            </div>
        </form>


    </div>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/bundle.js"></script>
</body>

</html>
